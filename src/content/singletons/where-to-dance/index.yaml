introEn: >-
  Tenerife offers many events around the island catering to salsa, bachata, and
  kizomba dancers. Here are some of the most popular social dance parties.
introEs: >-
  Tenerife ofrece numerosos eventos en toda la isla para bailarines de salsa,
  bachata y kizomba. A continuación, se muestran algunas de las fiestas de baile
  social más populares.
noteEn: >-
  Although most of these are regular events, please check if they happen on the
  day, as cancellations and changes often occur.
noteEs: >-
  Aunque la mayoría de estos son eventos regulares, verifica si se llevan a cabo
  el día indicado, ya que suelen ocurrir cancelaciones y cambios.
parties:
