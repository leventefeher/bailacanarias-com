heroTitleEn: Start the year dancing
heroTitleEs: Aprende a bailar con nosotros
heroSubtitleEn: >-
  Make new friends, start a healthy hobby, and join our dancing family.
  Beginners and improvers bachata dance classes in Puerto Santiago.
heroSubtitleEs: >-
  Nuevas clases de salsa, bachata y kizomba para principiantes. ¡Comienza tu
  viaje de baile con nosotros, aprende a bailar y diviértete al máximo!
aboutTitleEn: Hi, we are Baila Canarias!
aboutTitleEs: ¡Hola, somos Baila Canarias!
aboutSubtitleEn: Social dancers by heart
aboutSubtitleEs: Bailarines sociales de corazón
aboutBodyEn: >-
  We live for social dancing and our passion is to spread this wonder to as many
  people as we can. Previously known as Salsa Vagabundo, we have been teaching
  Salsa and Bachata in Los Gigantes, Puerto Santiago and Playa San Juan since
  the beginning of 2022.


  We all work towards the same goal: to spread the joy of social dancing to as
  many people as possible.
aboutBodyEs: >-
  Vivimos para el baile social y nuestra pasión es compartir esta maravilla con
  tantas personas como sea posible. Anteriormente conocidos como Salsa
  Vagabundo, llevamos enseñando Salsa y Bachata en Los Gigantes, Puerto
  Santiago y Playa San Juan desde principios de 2022.


  Todos trabajamos hacia el mismo objetivo: difundir la alegría del baile social
  a tantas personas como sea posible.
aboutImage: /images/2023/06/Us-three.jpg
