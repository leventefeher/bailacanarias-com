heroImage: /images/heroes/320A0544.jpg
introEn: >-
  Baila Canarias (previously known as Salsa Vagabundo), we have been teaching
  Salsa and Bachata in Los Gigantes, Puerto Santiago and Playa San Juan since
  the beginning of 2022.


  We all work towards the same goal: to spread the joy of social dancing to as
  many people as possible. We love everything to do with dance, but our
  specialities are Latin social dances — Salsa, Bachata, Kizomba and more.
introEs: >-
  Baila Canarias (anteriormente conocida como Salsa Vagabundo), llevamos
  enseñando Salsa y Bachata en Los Gigantes, Puerto Santiago y Playa San Juan
  desde principios de 2022.


  Todos trabajamos hacia el mismo objetivo: difundir la alegría del baile social
  a tantas personas como sea posible. Nos encanta todo lo relacionado con el
  baile, pero nuestras especialidades son los bailes sociales latinos — Salsa,
  Bachata, Kizomba y más.
members:
  - name: Bálint Markoth
    bioEn: >-
      With almost 20 years of experience in Cuban Dances, Bálint has been
      trained by top educators in Europe at renowned dance festivals. His
      classes embody a lively and enjoyable atmosphere, combining excellent
      teaching with a focus on partner communication and musicality.
    bioEs: >-
      Con casi 20 años de experiencia en bailes cubanos, Bálint ha sido formado
      por los mejores educadores de Europa en reconocidos festivales de baile.
      Sus clases crean un ambiente animado y agradable, combinando una excelente
      enseñanza con énfasis en la comunicación entre pareja y la musicalidad.
    photo: /images/2023/11/Balint.jpeg
  - name: Levente Feher
    bioEn: >-
      Levi has been dancing and moving most of his life. He profoundly loves
      Bachata, Salsa, Kizomba and everything to do with dancing.
    bioEs: >-
      Levi lleva bailando y moviéndose toda su vida. Siente un profundo amor por
      la Bachata, la Salsa, la Kizomba y todo lo relacionado con el baile.
    photo: /images/2023/10/Levente-Vagabundo.jpg
    profileLinkEn: /levente-feher
    profileLinkEs: /es/levente-feher
