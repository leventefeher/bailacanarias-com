introEn: >-
  Do you want to join our classes and learn to dance? You are in the right
  place. We offer salsa, bachata, and kizomba classes, workshops, courses,
  private classes and more. Find our upcoming and ongoing events below.
introEs: >-
  ¿Quieres unirte a nuestras clases y aprender a bailar? Estás en el lugar
  correcto. Ofrecemos clases de salsa, bachata, kizomba, talleres, cursos,
  clases privadas y más. Encuentra nuestros próximos eventos y los que ya están
  en marcha.
