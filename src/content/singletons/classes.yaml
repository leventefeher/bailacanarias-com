    location: B-Yard Food Court, Puerto Santiago
    time: 17:45–18:45
    descriptionEn: >-
      Monday weekly classes held at B-Yard Food Court in Puerto Santiago. Every
      Monday from 17:45 to 18:45.

      The class is divided into bachata moderna/sensual and traditional styles
      to help you understand the development of Bachata and how it evolved from
      the Dominican Republic. Please let us know on WhatsApp before attending,
      as sometimes we have to change the schedule at short notice.
    descriptionEs: >-
      Las clases semanales de los lunes se imparten en B-Yard Food Court en
      Puerto Santiago. Todos los lunes de 17:45 a 18:45.

      La clase se divide en estilos de bachata moderna/sensual y tradicional
      para ayudarte a comprender el desarrollo de la bachata y cómo evolucionó
      desde la República Dominicana.
    priceEn: 10€ / class · 35€ for 4 classes · 50€ for a couple for 4 classes
    priceEs: 10€ / clase · 35€ por 4 clases · 50€ por pareja para 4 clases
