      Bachata Moderna/Sensual and Traditional style. Suitable for people who are
      familiar with the basic steps, leading and following techniques and turn
      patterns. Welcome to drop in and join whenever you like. Please let us
      know on WhatsApp before attending, as sometimes we have to change the
